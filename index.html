<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #111;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
      transition: border-color 0.15s;
    }

    .add-form input:focus {
      border-color: #4f7ef7;
    }

    .add-form button {
      padding: 10px 18px;
      background: #4f7ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .add-form button:hover {
      background: #3a6ae8;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filter-btn {
      padding: 6px 14px;
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      color: #888;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .filter-btn:hover {
      border-color: #4f7ef7;
      color: #4f7ef7;
    }

    .filter-btn.active {
      background: #4f7ef7;
      border-color: #4f7ef7;
      color: #fff;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      padding: 12px 14px;
      transition: opacity 0.15s;
    }

    .task.done {
      opacity: 0.55;
    }

    .task input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f7ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .task-label {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .task.done .task-label {
      text-decoration: line-through;
      color: #888;
    }

    .calendar-btn {
      background: none;
      border: none;
      color: #bbb;
      font-size: 1.05rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .calendar-btn:hover {
      color: #4f7ef7;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #bbb;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: #e55;
    }

    .empty {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .clear-completed {
      display: none;
      margin: 16px auto 0;
      padding: 8px 16px;
      background: none;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      color: #888;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .clear-completed:hover {
      border-color: #e55;
      color: #e55;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do</h1>
    <form class="add-form" id="addForm">
      <input type="text" id="taskInput" placeholder="Add a task..." autocomplete="off">
      <button type="submit">Add</button>
    </form>
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>
    <div class="task-list" id="taskList"></div>
    <button class="clear-completed" id="clearCompleted">Clear completed</button>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // Publishable (anon) key only — never embed a secret/service-role key here.
    const SUPABASE_URL = 'https://uydipsmrvpupmbbqdttq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_sLVLd-mdTwT-1dAtPSO-Yg_uOVbxPP5';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Tasks are mirrored from the `todos` table. Each task is
    // { id, text, done } where text <- todos.task and done <- todos.is_complete.
    let tasks = [];
    let filter = 'all';

    function mapRow(row) {
      return { id: row.id, text: row.task, done: !!row.is_complete };
    }

    async function loadTasks() {
      const { data, error } = await supabase
        .from('todos')
        .select('*')
        .order('id', { ascending: true });
      if (error) {
        console.error('Failed to load tasks:', error);
        return;
      }
      tasks = data.map(mapRow);
      render();
    }

    // Build a Google Calendar event-creation URL for a task, as an all-day
    // event for today. The user can adjust the date/time before saving.
    function calendarUrl(text) {
      const d = new Date();
      const start = d.getFullYear() +
        String(d.getMonth() + 1).padStart(2, '0') +
        String(d.getDate()).padStart(2, '0');
      const next = new Date(d.getTime() + 86400000);
      const end = next.getFullYear() +
        String(next.getMonth() + 1).padStart(2, '0') +
        String(next.getDate()).padStart(2, '0');
      const params = new URLSearchParams({
        action: 'TEMPLATE',
        text: text,
        dates: start + '/' + end,
      });
      return 'https://calendar.google.com/calendar/render?' + params.toString();
    }

    function render() {
      const list = document.getElementById('taskList');
      list.innerHTML = '';

      const clearBtn = document.getElementById('clearCompleted');
      clearBtn.style.display = tasks.some(t => t.done) ? 'block' : 'none';

      if (tasks.length === 0) {
        list.innerHTML = '<p class="empty">No tasks yet. Add one above.</p>';
        return;
      }

      tasks.forEach((task, i) => {
        if (filter === 'active' && task.done) return;
        if (filter === 'completed' && !task.done) return;

        const item = document.createElement('div');
        item.className = 'task' + (task.done ? ' done' : '');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = task.done;
        checkbox.addEventListener('change', async () => {
          const newDone = checkbox.checked;
          const { error } = await supabase
            .from('todos')
            .update({ is_complete: newDone })
            .eq('id', task.id);
          if (error) {
            console.error('Failed to update task:', error);
            checkbox.checked = !newDone;
            return;
          }
          tasks[i].done = newDone;
          render();
        });

        const label = document.createElement('span');
        label.className = 'task-label';
        label.textContent = task.text;

        const cal = document.createElement('button');
        cal.className = 'calendar-btn';
        cal.textContent = '📅';
        cal.title = 'Add to calendar';
        cal.addEventListener('click', () => {
          window.open(calendarUrl(task.text), '_blank', 'noopener');
        });

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = 'Delete';
        del.addEventListener('click', async () => {
          const { error } = await supabase
            .from('todos')
            .delete()
            .eq('id', task.id);
          if (error) {
            console.error('Failed to delete task:', error);
            return;
          }
          tasks.splice(i, 1);
          render();
        });

        item.append(checkbox, label, cal, del);
        list.appendChild(item);
      });

      if (list.children.length === 0) {
        list.innerHTML = '<p class="empty">No ' + filter + ' tasks.</p>';
      }
    }

    document.getElementById('filters').addEventListener('click', (e) => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.toggle('active', b === btn));
      render();
    });

    document.getElementById('clearCompleted').addEventListener('click', async () => {
      const { error } = await supabase
        .from('todos')
        .delete()
        .eq('is_complete', true);
      if (error) {
        console.error('Failed to clear completed tasks:', error);
        return;
      }
      tasks = tasks.filter(t => !t.done);
      render();
    });

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('taskInput');
      const text = input.value.trim();
      if (!text) return;
      const { data, error } = await supabase
        .from('todos')
        .insert({ task: text })
        .select()
        .single();
      if (error) {
        console.error('Failed to add task:', error);
        return;
      }
      tasks.push(mapRow(data));
      input.value = '';
      render();
    });

    render();
    loadTasks();
  </script>
</body>
</html>
